services:
  stock-predictor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-predictor-app
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    env_file:
      - .env
    restart: unless-stopped
